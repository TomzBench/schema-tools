openapi: "3.1.0"
$id: "forge://test/main/v0"
info:
  title: Flatten test вЂ” entry points
  version: "0.1.0"
components:
  schemas:
    # в”Ђв”Ђ Inline cases в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    # Path A вЂ” top-level object
    standalone:
      type: object
      x-jsmn-type: standalone
      properties:
        value:
          type: integer
          format: uint32

    # Path Aв†’A вЂ” nested inline property
    parent:
      type: object
      x-jsmn-type: parent
      properties:
        child:
          type: object
          x-jsmn-type: parent_child
          properties:
            flag:
              type: boolean

    # Path Aв†’Bв†’A вЂ” inline array of objects
    array_host:
      type: object
      x-jsmn-type: array_host
      properties:
        records:
          type: array
          maxItems: 10
          items:
            type: object
            x-jsmn-type: array_item
            properties:
              id:
                type: integer
                format: uint32

    # Path Aв†’Bв†’Aв†’A вЂ” nested object in array items
    deep_array_host:
      type: object
      x-jsmn-type: deep_array_host
      properties:
        entries:
          type: array
          maxItems: 5
          items:
            type: object
            x-jsmn-type: deep_array_entry
            properties:
              detail:
                type: object
                x-jsmn-type: deep_array_detail
                properties:
                  code:
                    type: integer
                    format: uint16

    # в”Ђв”Ђ Top-level array cases в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    # Path Bв†’A вЂ” top-level array of inline objects
    top_array:
      type: array
      x-jsmn-type: top_array
      minItems: 0
      maxItems: 5
      items:
        type: object
        x-jsmn-type: top_array_item
        properties:
          id:
            type: integer
            format: uint32

    # Path Bв†’Cв†’A вЂ” top-level array with $ref items в†’ object
    top_arr_ref:
      type: array
      x-jsmn-type: top_arr_ref
      minItems: 0
      maxItems: 8
      items:
        $ref: "forge://test/targets/v0#/components/schemas/target_a"

    # в”Ђв”Ђ Top-level string cases в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    # Path D вЂ” top-level string
    top_string:
      type: string
      x-jsmn-type: top_string
      maxLength: 32

    # в”Ђв”Ђ $ref cases в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    # Path Aв†’Cв†’A вЂ” property в†’ $ref в†’ object
    ref_prop:
      type: object
      x-jsmn-type: ref_prop
      properties:
        linked:
          $ref: "forge://test/targets/v0#/components/schemas/target_a"

    # Path Aв†’Cв†’Aв†’A вЂ” property в†’ $ref в†’ object with nested child
    ref_nested:
      type: object
      x-jsmn-type: ref_nested
      properties:
        linked:
          $ref: "forge://test/targets/v0#/components/schemas/target_b"

    # Path Aв†’Bв†’Cв†’A вЂ” array items в†’ $ref в†’ object
    arr_ref_items:
      type: object
      x-jsmn-type: arr_ref_items
      properties:
        things:
          type: array
          maxItems: 8
          items:
            $ref: "forge://test/targets/v0#/components/schemas/target_a"

    # Path Aв†’Cв†’Bв†’A вЂ” property в†’ $ref в†’ array в†’ object
    ref_to_array:
      type: object
      x-jsmn-type: ref_to_array
      properties:
        collection:
          $ref: "forge://test/targets/v0#/components/schemas/target_c"

    # Path Aв†’Bв†’Cв†’Aв†’A вЂ” array items в†’ $ref в†’ object with nested child
    arr_ref_nested:
      type: object
      x-jsmn-type: arr_ref_nested
      properties:
        entries:
          type: array
          maxItems: 4
          items:
            $ref: "forge://test/targets/v0#/components/schemas/target_b"

    # в”Ђв”Ђ allOf cases в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    # allOf вЂ” two inline branches merged
    allof_inline:
      x-jsmn-type: allof_inline
      allOf:
        - type: object
          properties:
            alpha:
              type: integer
              format: uint32
        - type: object
          properties:
            beta:
              type: boolean

    # allOf + own properties вЂ” parent has properties and allOf branches
    allof_with_props:
      type: object
      x-jsmn-type: allof_with_props
      properties:
        own:
          type: integer
          format: uint16
      allOf:
        - type: object
          properties:
            merged:
              type: boolean

    # allOf with $ref branch вЂ” one branch is a cross-spec ref
    allof_ref:
      x-jsmn-type: allof_ref
      allOf:
        - $ref: "forge://test/targets/v0#/components/schemas/target_a"
        - type: object
          properties:
            extra:
              type: boolean

    # allOf with nested child вЂ” branch contains a marked nested object
    allof_nested:
      x-jsmn-type: allof_nested
      allOf:
        - type: object
          properties:
            child:
              type: object
              x-jsmn-type: allof_nested_child
              properties:
                flag:
                  type: boolean

    # allOf required union вЂ” required spread across parent + branches
    allof_required:
      x-jsmn-type: allof_required
      required: [from_parent]
      allOf:
        - type: object
          required: [from_branch]
          properties:
            from_parent:
              type: integer
              format: uint32
            from_branch:
              type: boolean
