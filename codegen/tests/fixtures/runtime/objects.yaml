openapi: "3.1.0"
$id: "forge://e2e/objects/v0"
info:
  title: Nested objects e2e test
  version: "0.1.0"
components:
  schemas:
    # Leaf struct — no deps
    tag:
      type: object
      x-jsmn-generate: tag
      required: [label]
      properties:
        label:
          type: string
          maxLength: 24

    # Leaf struct — primitive fields + fixed array
    item:
      type: object
      x-jsmn-generate: item
      required: [id, value, scores]
      properties:
        id:
          type: integer
          format: uint32
        value:
          type: integer
          format: int16
        scores:
          type: array
          minItems: 4
          maxItems: 4
          items: { type: integer, format: uint32 }

    # Nests item via $ref, has VLA of tags, exercises dependency ordering
    container:
      type: object
      x-jsmn-generate: container
      required: [item, tags, name]
      properties:
        name:
          type: string
          maxLength: 16
        item:
          $ref: "forge://e2e/objects/v0#/components/schemas/item"
        tags:
          type: array
          maxItems: 8
          items:
            $ref: "forge://e2e/objects/v0#/components/schemas/tag"
