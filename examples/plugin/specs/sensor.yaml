openapi: "3.1.0"
info:
  title: Sensor
  version: "0.1.0"
components:
  schemas:
    sensor_reading:
      type: object
      x-jsmn-type: sensor_reading
      required: [id, celsius, label]
      properties:
        id:
          type: integer
          format: uint32
        celsius:
          type: number
          format: float
        label:
          type: string
          maxLength: 16
